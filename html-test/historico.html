<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico de Clientes - Sistema de Mecânica</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="page-nav"><a href="index.html">← Voltar</a></div>
    <section class="card header-card">
      <p class="badge badge-primary">Histórico</p>
      <h1>Histórico de clientes</h1>
      <p>Busque por cliente, carro ou data e consulte serviços anteriores.</p>
    </section>

    <section class="card section-card" style="margin-top:24px;">
      <div class="grid-2">
        <input class="form-field" type="search" placeholder="Pesquisar por nome, carro ou data" />
        <button class="btn btn-primary">Buscar</button>
      </div>

      <div class="card" style="margin-top:24px; padding:24px; background:#F8FAFC;">
        <p class="badge badge-primary">Resultado</p>
        <p style="margin-top:14px; color:#64748B;">Nenhum histórico disponível até o momento. Cadastre clientes e notas para ver os registros aparecerem aqui.</p>
      </div>
    </section>
  </main>
</body>
</html>
