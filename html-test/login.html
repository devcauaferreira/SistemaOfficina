<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Mecânica</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <div class="page-nav"><a href="index.html">← Voltar</a></div>
    <section class="card header-card">
      <p class="badge badge-primary">Acesso</p>
      <h1>Login</h1>
      <p>Faça login para acessar o sistema.</p>
    </section>

    <section class="card section-card" style="margin-top:24px;">
      <div class="grid-1">
        <div>
          <label class="label" for="email">E-mail</label>
          <input id="email" type="email" class="form-field" placeholder="seu@email.com" />
        </div>
        <div>
          <label class="label" for="senha">Senha</label>
          <input id="senha" type="password" class="form-field" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary">Entrar</button>
      </div>
    </section>
  </main>
</body>
</html>
